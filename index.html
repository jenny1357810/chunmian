<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>春眠不觉晓猪圈有小猪</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main class="container">
      <!-- 顶部标题 -->
      <section class="hero">
        <h1>春眠不觉晓
猪圈有小猪</h1>
        <p>六级百业 · 欢迎您来</p>
      </section>

      <!-- 车队区域 -->
      <section class="team-section">
        <h2>本周车队</h2>

        <div class="team-grid">
          <!-- 卡片1 -->
          <div class="team-card">
            <h3>周一双十</h3>
            <p>队长：坤坤</p>
            <p>成员：小猪、奶龙、路人王</p>
            <span class="status done">已发车</span>
          </div>

          <!-- 卡片2 -->
          <div class="team-card">
            <h3>周三双十</h3>
            <p>队长：懒羊杨</p>
            <p>成员：小白、牢玩家、咕咕怪</p>
            <span class="status waiting">缺奶</span>
          </div>

          <!-- 卡片3 -->
          <div class="team-card">
            <h3>爬塔坐牢队</h3>
            <p>队长：牢王</p>
            <p>成员：阿眠、老登、牛马</p>
            <span class="status doing">坐牢中</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
